<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden; background: #000;
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root { position: relative; }
      .bg { position: absolute; inset: 0; background: #050505; }
      .bg::after {
        content: ""; position: absolute; left: 50%; top: 50%;
        width: 1200px; height: 1200px; transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(255,69,0,0.16) 0%, rgba(255,69,0,0) 62%);
      }
      .scene { position: absolute; inset: 0; display: flex; flex-direction: column;
               align-items: center; justify-content: center; padding: 0 90px; }
      .kicker { font-size: 30px; font-weight: 800; letter-spacing: 8px; color: #8a8a8a;
                text-transform: uppercase; }
      .headline { font-size: 70px; font-weight: 900; color: #fff; letter-spacing: 1px;
                  text-align: center; line-height: 1.05; }
      .card { width: 760px; border-radius: 32px; padding: 46px 50px; text-align: center; }
      .card .clabel { font-size: 30px; font-weight: 800; letter-spacing: 5px;
                      text-transform: uppercase; }
      .card .price { font-weight: 900; line-height: 1; }
      .card .per { font-size: 36px; font-weight: 700; }
      .vs { width: 130px; height: 130px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 52px; font-weight: 900;
            color: #fff; background: #FF4500; box-shadow: 0 0 60px rgba(255,69,0,0.6); }
      .big-num { font-size: 360px; font-weight: 900; color: #FF4500; line-height: 0.9;
                 text-shadow: 0 0 80px rgba(255,69,0,0.5); }
      .sub { font-size: 80px; font-weight: 900; color: #fff; text-align: center; line-height: 1.05; }
      .discs { font-size: 38px; font-weight: 700; color: #cfcfcf; letter-spacing: 2px;
               text-align: center; line-height: 1.6; max-width: 880px; }
      .badge { padding: 26px 60px; border-radius: 999px; background: #FF4500;
               font-size: 52px; font-weight: 900; color: #fff; letter-spacing: 2px;
               box-shadow: 0 0 70px rgba(255,69,0,0.55); }
      .small { font-size: 32px; font-weight: 800; letter-spacing: 6px; color: #9a9a9a;
               text-transform: uppercase; }
      .logo { font-size: 132px; font-weight: 900; color: #fff; letter-spacing: 1px; }
      .logo b { color: #FF4500; }
      .tag { font-size: 46px; font-weight: 800; color: #FF4500; letter-spacing: 1px; }
      .url { font-size: 40px; font-weight: 800; color: #fff; letter-spacing: 4px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="13"
         data-width="1080" data-height="1920">
      <div class="bg"></div>

      <!-- SCENE 1 — split prix -->
      <div id="s1" class="scene clip" data-start="0" data-duration="4.2" data-track-index="1">
        <div id="s1-head" class="headline" style="margin-bottom: 70px"><span style="display:block">LE MÊME</span><span style="display:block">COACHING.</span></div>
        <div id="s1-cardA" class="card" style="background:#161616; border:2px solid #3a1a1a; margin-bottom: 30px">
          <div class="clabel" style="color:#ff6b6b">Coach perso</div>
          <div class="price" style="font-size:140px; color:#777; text-decoration:line-through; text-decoration-color:#ff5252">200 €</div>
          <div class="per" style="color:#777">par mois</div>
        </div>
        <div id="s1-vs" class="vs" style="margin: 4px 0 30px">VS</div>
        <div id="s1-cardB" class="card" style="background:linear-gradient(160deg,#241200,#120a02); border:2px solid #FF4500;">
          <div class="clabel" style="color:#fff">Xenotif®</div>
          <div class="price" style="font-size:170px; color:#FF4500">9,99 €</div>
          <div class="per" style="color:#fff">par mois</div>
        </div>
      </div>

      <!-- SCENE 2 — 20x moins cher -->
      <div id="s2" class="scene clip" data-start="4.2" data-duration="4.3" data-track-index="2">
        <div id="s2-num" class="big-num">20×</div>
        <div id="s2-sub" class="sub" style="margin: 10px 0 60px">MOINS CHER</div>
        <div id="s2-discs" class="discs"><span style="display:block">Muscu · Running · HIIT</span><span style="display:block">CrossFit · Natation · Vélo</span></div>
        <div id="s2-pocket" class="sub" style="font-size:54px; color:#FF4500; margin-top:60px">Dans ta poche.</div>
      </div>

      <!-- SCENE 3 — CTA -->
      <div id="s3" class="scene clip" data-start="8.5" data-duration="4.5" data-track-index="3">
        <div id="s3-badge" class="badge" style="margin-bottom: 34px">7 JOURS GRATUITS</div>
        <div id="s3-eng" class="small" style="margin-bottom: 90px">Sans engagement</div>
        <div id="s3-logo" class="logo" style="margin-bottom: 18px">XENO<b>TIF®</b></div>
        <div id="s3-tag" class="tag" style="margin-bottom: 70px">Forge ton corps.</div>
        <div id="s3-url" class="url">XENOTIF.COM</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // SCENE 1
      tl.fromTo("#s1-head", { opacity: 0, y: -50 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.1);
      tl.fromTo("#s1-cardA", { opacity: 0, x: -160 }, { opacity: 1, x: 0, duration: 0.6, ease: "power3.out" }, 0.45);
      tl.fromTo("#s1-vs", { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(2)" }, 0.95);
      tl.fromTo("#s1-cardB", { opacity: 0, x: 160 }, { opacity: 1, x: 0, duration: 0.6, ease: "power3.out" }, 1.2);

      // SCENE 2
      tl.fromTo("#s2-num", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.7)" }, 4.3);
      tl.fromTo("#s2-sub", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 4.65);
      tl.fromTo("#s2-discs", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 5.1);
      tl.fromTo("#s2-pocket", { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.7)" }, 5.9);

      // SCENE 3
      tl.fromTo("#s3-badge", { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2)" }, 8.6);
      tl.fromTo("#s3-eng", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 9.0);
      tl.fromTo("#s3-logo", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 9.3);
      tl.fromTo("#s3-tag", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 9.9);
      tl.fromTo("#s3-url", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 10.3);
      tl.to("#s3-badge", { scale: 1.06, duration: 0.5, repeat: 3, yoyo: true, ease: "sine.inOut" }, 10.8);

      tl.seek(0);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
